<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>香港即時分區天氣 3D 可視化</title>
<link rel="stylesheet" href="style.css">

<!-- 修正瀏覽器無法解析 "three" 模組的問題 -->
<script type="importmap">
{
"imports": {
"three": "https://unpkg.com/three@0.152.0/build/three.module.js",
"three/addons/": "https://unpkg.com/three@0.152.0/examples/jsm/"
}
}
</script>
</head>
<body class="war-room">

<!-- 1. 左側大標題區（強制顯示） -->
<header class="main-header" style="display: block !important; opacity: 1 !important; visibility: visible !important; z-index: 999; position: absolute; left: 30px; top: 30px; pointer-events: auto;">
<p class="subtitle" style="display: block !important; opacity: 1 !important;">實時數據動態推演 / 3D 視覺化</p>
<h1 id="mainTitle" style="display: block !important; opacity: 1 !important; color: #ffffff;">香港分區氣溫</h1>
<p class="date-range" id="weatherReadout" style="display: block !important; opacity: 1 !important; color: #ffe08a;">正在讀取天文台數據...</p>
</header>

<!-- 2. 主要 3D 畫布 -->
<main class="map-container">
<canvas id="battlefield"></canvas>
</main>

<!-- 3. 右側數據面板（強制顯示） -->
<section class="info-panel" style="display: block !important; opacity: 1 !important; visibility: visible !important; z-index: 999; position: absolute; right: 30px; top: 30px; pointer-events: auto;">
<article class="event-card" style="display: block !important; opacity: 1 !important;">
<time class="event-time" id="cameraReadout" style="display: block !important; opacity: 1 !important;">3D 自由運鏡模式</time>
<h2 class="event-title" id="eventTitle" style="display: block !important; opacity: 1 !important; color: #ffffff;">即時氣象報告</h2>
<p class="event-copy" id="eventCopy" style="display: block !important; opacity: 1 !important; color: rgba(255,255,255,0.8);">
本系統每 5 分鐘自動經由 API 同步香港天文台各個監測站的實時氣溫，並即時投射至 3D 地圖對應的空間座標上。
</p>

<!-- 數據統計格 -->
<div class="stats-grid" style="display: grid !important; opacity: 1 !important;">
<div class="stat-box" style="display: block !important; opacity: 1 !important;">
<span class="stat-label">環境效果</span>
<span class="stat-value" style="font-size: 1rem; color: #ffe08a; display: block !important;">雨絲、雲朵、探照燈</span>
</div>
<div class="stat-box" style="display: block !important; opacity: 1 !important;">
<span class="stat-label">數據來源</span>
<span class="stat-value" style="font-size: 1rem; color: #ffe08a; display: block !important;">香港天文台 (API)</span>
</div>
</div>
</article>
</section>

<!-- 4. 底部圖例說明（強制顯示） -->
<footer class="timeline-container" style="display: flex !important; opacity: 1 !important; visibility: visible !important; justify-content: center; padding: 15px; color: rgba(255,255,255,0.7); font-size: 0.9rem; z-index: 999; position: absolute; bottom: 20px; width: 100%; pointer-events: none;">
<span style="background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 4px; pointer-events: auto;">
💡 提示：按住滑鼠左鍵拖曳可旋轉 3D 地圖，滑鼠滾輪可放大縮小，滑鼠右鍵拖曳可平移視角。
</span>
</footer>

<!-- 讀取動畫遮罩 -->
<div id="loading" class="loading-overlay">
<div class="spinner"></div>
<p>載入 3D 地形場景中...</p>
</div>

<!-- 引入你的 3D 邏輯腳本 -->
<script type="module" src="script.js"></script>
</body>
</html>
