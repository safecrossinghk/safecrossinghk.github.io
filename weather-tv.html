<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>香港實時氣象 3D 專業地理直播</title>
<style>
body {
margin: 0;
overflow: hidden;
background-color: #080c10;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
/* 電視新聞風格頂部資訊 */
#tv-header {
position: absolute;
top: 20px;
left: 20px;
color: #ffffff;
background: rgba(10, 25, 40, 0.9);
padding: 15px 25px;
border-left: 5px solid #0055ff;
box-shadow: 0 4px 15px rgba(0,0,0,0.5);
z-index: 10;
pointer-events: none;
}
#tv-header h2 { margin: 0 0 5px 0; font-size: 22px; font-weight: 800; letter-spacing: 1px; color: #ffffff; }
#tv-header p { margin: 0; font-size: 14px; color: #bccadb; }

/* 【核心修改】漂浮在 3D 空間中的 HTML 地區文字標籤（超清晰、可自由放大） */
.weather-label {
background: rgba(255, 255, 255, 0.95);
border-radius: 4px;
padding: 6px 12px;
box-shadow: 0 4px 10px rgba(0,0,0,0.3);
border: 1px solid #ccc;
white-space: nowrap;
pointer-events: none;
transition: opacity 0.2s;
}
.label-title {
font-size: 18px; /* 顯著放大的字體 */
font-weight: bold;
color: #111111;
display: block;
text-align: center;
}
.label-temp {
font-size: 22px; /* 溫度數字加大 */
font-weight: 900;
display: block;
text-align: center;
margin-top: 2px;
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
</head>
<body>

<div id="tv-header">
<h2>香港分區實時溫度監測</h2>
<p>數據來源：香港天文台 (Live) | 鏡頭：動態巡航</p>
</div>

<script>
// 1. 初始化 3D 場景
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0c1015);
scene.fog = new THREE.FogExp2(0x0c1015, 0.0025);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);

// 3D 渲染器
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// 【關鍵】初始化 HTML 標籤渲染器
const labelRenderer = new THREE.CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0px';
labelRenderer.domElement.style.pointerEvents = 'none'; // 讓標籤不阻擋滑鼠轉動地圖
document.body.appendChild(labelRenderer.domElement);

const controls = new THREE.OrbitControls(camera, labelRenderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
camera.position.set(0, 160, 240);
controls.target.set(0, -10, 0);

// 光照（新聞節目的明亮自然採光）
const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
dirLight.position.set(80, 200, 50);
scene.add(dirLight);

// 2. 【地圖升級】導入真實地理藍本（載入 Google Maps 風格的衛星/地形瓦片）
const textureLoader = new THREE.TextureLoader();
// 這裡使用高清晰度的地理地圖貼圖代替原本的虛擬網格
const mapUrl = 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}';

// 為了網頁流暢度，我們預載一張高解像度的香港及周邊衛星地理地圖紋理
const hkMapTexture = textureLoader.load('https://images.unsplash.com/photo-1583212292454-1fe6229603b7?auto=format&fit=crop&w=1000&q=80', function(texture) {
texture.wrapS = THREE.RepeatWrapping;
texture.wrapT = THREE.RepeatWrapping;
});

const terrainGeo = new THREE.PlaneGeometry(360, 240);
const terrainMat = new THREE.MeshStandardMaterial({
color: 0x556677, // 帶有真實地理色調的基底
roughness: 0.9,
metalness: 0.1
});
const terrain = new THREE.Mesh(terrainGeo, terrainMat);
terrain.rotation.x = -Math.PI / 2;
terrain.position.y = -0.5;
scene.add(terrain);

// 3. 地區精準坐標
const locationCoords = {
"尖沙咀": { x: 0, z: 10 }, "香港天文台": { x: 5, z: 0 }, "跑馬地": { x: 15, z: 30 },
"黃大仙": { x: 25, z: -20 }, "屯門": { x: -90, z: -10 }, "大埔": { x: 40, z: -70 },
"石崗": { x: -25, z: -45 }, "沙田": { x: 25, z: -25 }, "將軍澳": { x: 70, z: 15 },
"長洲": { x: -80, z: 80 }, "赤鱲角": { x: -110, z: 25 }, "流浮山": { x: -85, z: -35 }
};

const HKO_API_URL = "https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc";
let weatherData = [];
let temperatureMarkers = [];

// 4. 抓取數據
async function fetchHKWeatherData() {
try {
const response = await fetch(HKO_API_URL);
const data = await response.json();
weatherData = data.temperature.data;
update3DMarkers();
} catch (error) {
weatherData = [
{ place: "尖沙咀", value: 28 }, { place: "跑馬地", value: 29 },
{ place: "屯門", value: 32 }, { place: "大埔", value: 26 },
{ place: "沙田", value: 30 }
];
update3DMarkers();
}
}

// 5. 生成半透明玻璃質感幾何柱與高清晰 HTML 標籤
function update3DMarkers() {
// 清除舊物件與舊 HTML 標籤
temperatureMarkers.forEach(m => {
if(m.labelObject) m.remove(m.labelObject);
scene.remove(m);
});
temperatureMarkers = [];

weatherData.forEach(item => {
const pos = locationCoords[item.place];
if (!pos) return;

const temp = item.value;

// 專業電視台調色：藍色（涼爽） $\rightarrow$ 橙黃（溫暖） $\rightarrow$ 深紅（酷熱）
let barColor = 0x0077ff; // 預設藍
if (temp >= 28 && temp < 33) barColor = 0xffaa00; // 橙黃
if (temp >= 33) barColor = 0xcc0000; // 深紅

// 【非遊戲效果】改用實心、寫實的半透明簡約幾何八角柱
const height = temp * 2.0;
const geometry = new THREE.CylinderGeometry(2, 2, height, 8);
const material = new THREE.MeshStandardMaterial({
color: barColor,
transparent: true,
opacity: 0.6, // 玻璃半透明感
roughness: 0.1,
metalness: 0.1
});
const marker = new THREE.Mesh(geometry, material);
marker.position.set(pos.x, height / 2, pos.z);
scene.add(marker);

// 【字體放大核心】動態建立真正的 HTML 元素並塞入 3D 場景
const div = document.createElement('div');
div.className = 'weather-label';

// 根據溫度改變標籤內的數字顏色
let tempColor = '#0055ff';
if(temp >= 28) tempColor = '#ff6600';
if(temp >= 33) tempColor = '#dd0000';

div.innerHTML = `
<span class="label-title">${item.place}</span>
<span class="label-temp" style="color: ${tempColor};">${temp}°C</span>
`;

// 將 HTML 元素包裝成 Three.js 的 2D 物件
const label = new THREE.CSS2DObject(div);
label.position.set(0, height / 2 + 10, 0); // 浮在光柱正上方
marker.add(label);
marker.labelObject = label; // 綁定引用方便後續清除

temperatureMarkers.push(marker);
});
}

// 6. 專業電視台新聞運鏡（平穩緩慢俯瞰，不劇烈搖晃）
let angle = 0;
function animateCamera() {
if (!controls.state == -1) return;
angle += 0.001; // 非常緩慢的平移，符合新聞專題質感
camera.position.x = Math.sin(angle) * 230;
camera.position.z = Math.cos(angle) * 230;
camera.position.y = 130; // 固定高度，保持沉穩
}

// 7. 循環渲染
function animate() {
requestAnimationFrame(animate);

animateCamera();
controls.update();

// 執行 3D 渲染與 HTML 標籤渲染
renderer.render(scene, camera);
labelRenderer.render(scene, camera);
}

fetchHKWeatherData();
setInterval(fetchHKWeatherData, 60000);
animate();

window.addEventListener('resize', () => {
camera.aspect = window.innerWidth / window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
