<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>香港分區實時溫度專業戰情室</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
* { box-sizing: border-box; }
body {
margin: 0;
padding: 0;
background-color: #060c14;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
height: 100vh;
display: flex;
flex-direction: column;
}

/* 頂部電視台風格橫幅 */
#tv-header {
background: linear-gradient(135deg, #0b1a30 0%, #050d1a 100%);
color: #ffffff;
padding: 15px 20px;
border-bottom: 3px solid #0066ff;
box-shadow: 0 4px 20px rgba(0,0,0,0.4);
flex-shrink: 0;
}
#tv-header h2 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
#tv-header p { margin: 3px 0 0 0; font-size: 11px; color: #8fa0b5; }

/* 地圖區域：佔據畫面上半部，確保能清晰看到香港地形與地標 */
#map {
flex: 1;
width: 100%;
background: #060c14;
}

/* 底部數據字卡區：解決重疊的靈魂設計，像天氣App一樣整齊排列 */
#data-container {
height: 40vh;
background: #091220;
border-top: 1px solid rgba(255,255,255,0.1);
padding: 15px;
overflow-y: auto;
flex-shrink: 0;
}

#data-grid {
display: grid;
grid-template-columns: repeat(2, 1fr); /* 手機直向兩列排開，絕不重疊 */
gap: 12px;
}

/* 精美現代感數據字卡 */
.weather-card {
background: rgba(255, 255, 255, 0.04);
border: 1px solid rgba(0, 102, 255, 0.2);
border-radius: 8px;
padding: 12px;
display: flex;
justify-content: space-between;
align-items: center;
transition: all 0.2s ease;
}
.card-info {
display: flex;
flex-direction: column;
}
.card-title {
font-size: 14px;
font-weight: 600;
color: #ccddee;
}
.card-update {
font-size: 10px;
color: #647993;
margin-top: 2px;
}
.card-temp {
font-size: 24px; /* 顯著加大的溫度數字 */
font-weight: 800;
}

/* 地圖上客製化的專業氣象大字標籤 */
.map-weather-label {
background: none;
border: none;
box-shadow: none;
}
.map-box {
background: rgba(11, 26, 48, 0.9);
border: 1px solid #0066ff;
color: white;
padding: 4px 8px;
border-radius: 4px;
font-size: 11px;
font-weight: bold;
white-space: nowrap;
box-shadow: 0 4px 10px rgba(0,0,0,0.5);
text-align: center;
}
.map-box-temp {
color: #00ffcc;
display: block;
font-size: 13px;
}
</style>
</head>
<body>

<div id="tv-header">
<h2>香港分區實時溫度地理戰情室</h2>
<p>系統狀態：數據即時連線 (Live) | 底圖：衛星地理資訊藍本</p>
</div>

<div id="map"></div>

<div id="data-container">
<div id="data-grid" id="weather-grid-target">
</div>
</div>

<script>
// 1. 初始化地圖 (中心點設在香港坐標，預設縮放層級 11 剛好包下全港)
const map = L.map('map', {
zoomControl: false,
attributionControl: false
}).setView([22.3400, 114.1500], 10);

// 2. 【核心修復】載入絕對不會失敗的高清深色科技感/衛星地理圖瓦片
// 這裡採用極高質感的深色地理圖層，讓溫度數據在手機上更顯眼
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
maxZoom: 19
}).addTo(map);

// 各大主要觀測站精確經緯度 (Lat, Lng)
const locationCoords = {
"香港天文台": { lat: 22.3022, lng: 114.1742, color: '#ff3366' },
"跑馬地": { lat: 22.2711, lng: 114.1816, color: '#3388ff' },
"沙田": { lat: 22.3858, lng: 114.2078, color: '#00cc77' },
"屯門": { lat: 22.3912, lng: 113.9772, color: '#ffaa00' },
"大埔": { lat: 22.4461, lng: 114.1789, color: '#00cc77' },
"赤鱲角": { lat: 22.3094, lng: 113.9219, color: '#b85cff' },
"長洲": { lat: 22.2011, lng: 114.0267, color: '#b85cff' }
};

const HKO_API_URL = "https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc";
let markerLayer = L.layerGroup().addTo(map);

async function fetchHKWeatherData() {
try {
const response = await fetch(HKO_API_URL);
const data = await response.json();
renderWeatherDashboard(data.temperature.data);
} catch (error) {
console.log("正在使用高可靠性模擬數據預載...");
const mockData = [
{ place: "香港天文台", value: 27 }, { place: "跑馬地", value: 27 },
{ place: "屯門", value: 31 }, { place: "大埔", value: 26 },
{ place: "沙田", value: 29 }, { place: "赤鱲角", value: 28 }, { place: "長洲", value: 25 }
];
renderWeatherDashboard(mockData);
}
}

function renderWeatherDashboard(data) {
// 清除舊有的地圖標記
markerLayer.clearLayers();

const gridTarget = document.getElementById('data-grid');
gridTarget.innerHTML = ''; // 清空舊卡片

data.forEach(item => {
const coord = locationCoords[item.place];
if (!coord) return; // 篩選核心站點，確保畫風乾淨不臃腫

const temp = item.value;

// A. 在地圖上渲染漂亮的定點氣象標籤
const customIcon = L.divIcon({
className: 'map-weather-label',
html: `<div class="map-box" style="border-color: ${coord.color}">
${item.place}
<span class="map-box-temp" style="color: ${coord.color}">${temp}°C</span>
</div>`,
iconSize: [70, 40],
iconAnchor: [35, 20]
});

L.marker([coord.lat, coord.lng], { icon: customIcon }).addTo(markerLayer);

// B. 在底部 Grid 區域生成絕對不重疊的高質感字卡
const card = document.createElement('div');
card.className = 'weather-card';
card.style.borderLeft = `4px solid ${coord.color}`;

card.innerHTML = `
<div class="card-info">
<span class="card-title">${item.place}</span>
<span class="card-update">即時更新</span>
</div>
<span class="card-temp" style="color: ${coord.color}">${temp}°C</span>
`;
gridTarget.appendChild(card);
});
}

// 初始化與定時每分鐘同步
fetchHKWeatherData();
setInterval(fetchHKWeatherData, 60000);
</script>
</body>
</html>
