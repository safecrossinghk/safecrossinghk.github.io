<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>香港實時氣象 3D 專業地理直播 V3</title>
<style>
body {
margin: 0;
overflow: hidden;
background-color: #050810;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
/* 電視氣象新聞風格頂部資訊 */
#tv-header {
position: absolute;
top: 20px;
left: 20px;
color: #ffffff;
background: rgba(10, 20, 35, 0.85);
padding: 15px 25px;
border-left: 4px solid #0066ff;
box-shadow: 0 10px 30px rgba(0,0,0,0.5);
backdrop-filter: blur(10px);
z-index: 10;
pointer-events: none;
border-radius: 4px;
}
#tv-header h2 { margin: 0 0 5px 0; font-size: 20px; font-weight: 700; letter-spacing: 1px; }
#tv-header p { margin: 0; font-size: 13px; color: #a0aec0; }

/* 【佈局優化】高質感、不易遮擋的懸浮天氣看板 */
.weather-card {
background: rgba(255, 255, 255, 0.92);
border-left: 5px solid #0066ff;
border-radius: 4px;
padding: 8px 14px;
box-shadow: 0 6px 20px rgba(0,0,0,0.3);
pointer-events: none;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
min-width: 80px;
}
.card-title {
font-size: 14px;
font-weight: bold;
color: #333333;
}
.card-temp {
font-size: 22px;
font-weight: 900;
margin-top: 2px;
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
</head>
<body>

<div id="tv-header">
<h2>香港分區實時溫度動態</h2>
<p>數據來源：香港天文台 (Live更新) | 地圖藍本：衛星地理資訊</p>
</div>

<script>
// 1. 初始化 3D 場景與環境
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x060913);
scene.fog = new THREE.FogExp2(0x060913, 0.002);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// 初始化 HTML 標籤渲染器
const labelRenderer = new THREE.CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0px';
labelRenderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(labelRenderer.domElement);

const controls = new THREE.OrbitControls(camera, labelRenderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// 調整初始鏡頭：更舒適的俯瞰斜視角，避免標籤水平重疊
camera.position.set(0, 190, 240);
controls.target.set(0, -10, 0);

// 增強自然採光，讓地圖材質顯現
const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.4);
dirLight.position.set(100, 200, 50);
scene.add(dirLight);

// 2. 【核心解決：拒絕灰色】引入真實高清衛星地圖地盤
const textureLoader = new THREE.TextureLoader();
// 這裡載入一張預先配准好的高清香港周邊地形衛星影像圖
const satelliteTexture = textureLoader.load('https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Hong_Kong_Sentinel-2.jpg/1024px-Hong_Kong_Sentinel-2.jpg');

const terrainGeo = new THREE.PlaneGeometry(320, 200);
const terrainMat = new THREE.MeshStandardMaterial({
map: satelliteTexture, // 將衛星地圖作為材質貼圖
roughness: 0.8,
metalness: 0.1
});
const terrain = new THREE.Mesh(terrainGeo, terrainMat);
terrain.rotation.x = -Math.PI / 2;
terrain.position.y = -1;
scene.add(terrain);

// 3. 【佈局優化】精心篩選具有代表性、分散不擁擠的主要站點座標
const locationCoords = {
"香港天文台": { x: 5, z: 10, color: '#ff3366' }, // 市中心核心
"跑馬地": { x: 12, z: 28, color: '#0066ff' },
"屯門": { x: -85, z: -5, color: '#ff9900' }, // 新界西
"大埔": { x: 35, z: -65, color: '#00aa55' }, // 新界東
"沙田": { x: 22, z: -20, color: '#00aa55' },
"赤鱲角": { x: -105, z: 22, color: '#9933ff' }, // 機場外島
"長洲": { x: -75, z: 75, color: '#9933ff' } // 離島
};

const HKO_API_URL = "https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc";
let weatherElements = [];

// 4. 獲取天文台數據
async function fetchHKWeatherData() {
try {
const response = await fetch(HKO_API_URL);
const data = await response.json();
update3DScene(data.temperature.data);
} catch (error) {
// 斷線備用精簡數據
const mockData = [
{ place: "香港天文台", value: 27 }, { place: "跑馬地", value: 28 },
{ place: "屯門", value: 31 }, { place: "大埔", value: 25 },
{ place: "沙田", value: 29 }, { place: "赤鱲角", value: 28 },
{ place: "長洲", value: 26 }
];
update3DScene(mockData);
}
}

// 5. 動態構建含「指引線」與「專業看板」的立體場景
function update3DScene(data) {
// 清理舊有物件
weatherElements.forEach(el => {
scene.remove(el.line);
scene.remove(el.dot);
if(el.label) el.dot.remove(el.label);
});
weatherElements = [];

data.forEach(item => {
const pos = locationCoords[item.place];
if (!pos) return; // 篩選掉未定義的密集站點，優化空間佈局

const temp = item.value;
const configColor = pos.color;

// A. 地面定位圓點
const dotGeo = new THREE.CylinderGeometry(2, 2, 0.5, 16);
const dotMat = new THREE.MeshBasicMaterial({ color: configColor });
const dot = new THREE.Mesh(dotGeo, dotMat);
dot.position.set(pos.x, -0.7, pos.z);
scene.add(dot);

// B. 【防擠壓關鍵：垂直指引線】
// 讓每個標籤的高度不同（例如根據溫度或站點錯開高度），拉開層次
const lineHeight = 35 + (temp * 0.5);
const points = [
new THREE.Vector3(pos.x, -0.5, pos.z),
new THREE.Vector3(pos.x, lineHeight, pos.z)
];
const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
const lineMat = new THREE.LineBasicMaterial({ color: 0xcccccc, transparent: true, opacity: 0.4 });
const line = new THREE.Line(lineGeo, lineMat);
scene.add(line);

// C. 建立清晰的 2D HTML 天氣卡片
const div = document.createElement('div');
div.className = 'weather-card';
div.style.borderLeftColor = configColor; // 用邊框顏色區分地域

div.innerHTML = `
<span class="card-title">${item.place}</span>
<span class="card-temp" style="color: ${configColor};">${temp}°C</span>
`;

// 將卡片掛在指引線的頂端
const label = new THREE.CSS2DObject(div);
label.position.set(0, lineHeight, 0);
dot.add(label);

// 儲存引用便於更新
weatherElements.push({ dot, line, label });
});
}

// 6. 電視新聞緩慢環繞運鏡
let angle = 0;
function animateCamera() {
if (!controls.state == -1) return;
angle += 0.0008; // 放慢旋轉速度，使其更沉穩專業
camera.position.x = Math.sin(angle) * 250;
camera.position.z = Math.cos(angle) * 250;
camera.position.y = 150;
}

// 7. 動態循環
function animate() {
requestAnimationFrame(animate);
animateCamera();
controls.update();

renderer.render(scene, camera);
labelRenderer.render(scene, camera);
}

// 啟動
fetchHKWeatherData();
setInterval(fetchHKWeatherData, 60000);
animate();

// 響應式調整
window.addEventListener('resize', () => {
camera.aspect = window.innerWidth / window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
