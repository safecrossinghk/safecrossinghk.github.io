<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>香港實時分區天氣 · 3D 地形動畫</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --cold:#3EB5F1;--warm:#FF4E3A;--neutral:#E8D87A;
  --bg:#060B14;--glass:rgba(6,11,20,0.82);--border:rgba(62,181,241,0.22);--text:#D6EAF8
}
html,body{width:100%;height:100vh;background:var(--bg);color:var(--text);
  font-family:'Noto Sans HK','Segoe UI',sans-serif;overflow:hidden;position:relative}
#cv{display:block;width:100%;height:100vh}

/* ─── Top Bar ─── */
#topbar{position:fixed;top:0;left:0;right:0;z-index:30;
  display:flex;align-items:center;justify-content:space-between;padding:13px 24px;
  background:linear-gradient(180deg,rgba(6,11,20,0.97) 65%,transparent);
  border-bottom:1px solid var(--border)}
.logo{font-family:monospace;font-weight:700;font-size:12px;letter-spacing:3.5px;color:var(--cold)}
.title{font-weight:700;font-size:16px;letter-spacing:1px}
#clock{font-family:monospace;font-size:13px;color:var(--cold);letter-spacing:2.5px}

/* ─── Camera Info ─── */
#cam-info{position:fixed;bottom:56px;left:50%;transform:translateX(-50%);z-index:30;
  font-size:10px;letter-spacing:2.5px;color:rgba(214,234,248,0.5);text-transform:uppercase;
  white-space:nowrap;transition:opacity .6s;text-shadow:0 0 12px rgba(62,181,241,.4)}

/* ─── Legend ─── */
#legend{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:30;
  display:flex;gap:22px;align-items:center;
  background:var(--glass);border:1px solid var(--border);border-radius:30px;
  padding:8px 24px;backdrop-filter:blur(12px);font-size:11px;letter-spacing:1px}
.ldot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
.lc .ldot{background:var(--cold);box-shadow:0 0 7px var(--cold)}
.ln .ldot{background:var(--neutral);box-shadow:0 0 7px var(--neutral)}
.lw .ldot{background:var(--warm);box-shadow:0 0 7px var(--warm)}

/* ─── Side Panel ─── */
#panel{position:fixed;right:16px;top:60px;z-index:30;width:175px;
  display:flex;flex-direction:column;gap:7px;opacity:0;transition:opacity .8s}
#panel.vis{opacity:1}
.pr{background:var(--glass);border:1px solid var(--border);border-radius:8px;
  padding:8px 12px;backdrop-filter:blur(12px);display:flex;justify-content:space-between;
  align-items:center;font-size:11px}
.pn{color:rgba(214,234,248,.65)}
.pv{font-family:monospace;font-size:13px;font-weight:700}

/* ─── Status overlay ─── */
#status{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:var(--bg);transition:opacity .8s}
#status.hidden{opacity:0;pointer-events:none}
.spin{width:50px;height:50px;border:2.5px solid var(--border);border-top-color:var(--cold);
  border-radius:50%;animation:sp 1s linear infinite;margin-bottom:20px}
@keyframes sp{to{transform:rotate(360deg)}}
.smsg{font-size:13px;letter-spacing:2px;color:rgba(214,234,248,.65)}

/* ─── Refresh button ─── */
#refresh-btn{position:fixed;left:16px;bottom:14px;z-index:30;
  background:var(--glass);border:1px solid var(--border);border-radius:20px;
  color:var(--cold);font-size:11px;letter-spacing:1.5px;padding:7px 18px;
  cursor:pointer;backdrop-filter:blur(12px);transition:background .2s}
#refresh-btn:hover{background:rgba(62,181,241,.12)}
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="status">
  <div class="spin"></div>
  <div class="smsg" id="smsg">正在初始化…</div>
</div>

<!-- 3D canvas -->
<canvas id="cv"></canvas>

<!-- Top bar -->
<div id="topbar">
  <div class="logo">HKO · LIVE 3D</div>
  <div class="title">香港實時分區天氣報告</div>
  <div id="clock">--:--:--</div>
</div>

<!-- Camera info strip -->
<div id="cam-info">初始化鏡頭中…</div>

<!-- Side data panel -->
<div id="panel"></div>

<!-- Bottom legend -->
<div id="legend">
  <span class="lc"><span class="ldot"></span>低溫 (&lt;23°C)</span>
  <span class="ln"><span class="ldot"></span>適中 (23–28°C)</span>
  <span class="lw"><span class="ldot"></span>高溫 (&gt;28°C)</span>
</div>

<!-- Refresh button -->
<button id="refresh-btn" onclick="location.reload()">⟳ 重新抓取數據</button>

<!-- Three.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.min.js"></script>
<script>
'use strict';

// ══════════════════════════════════════════
//  Helpers
// ══════════════════════════════════════════
const setMsg = m => document.getElementById('smsg').textContent = m;
const hideStatus = () => document.getElementById('status').classList.add('hidden');
const camInfoEl  = document.getElementById('cam-info');
const panelEl    = document.getElementById('panel');

// Live clock
setInterval(() => {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('zh-HK', { hour12: false });
}, 1000);

// ══════════════════════════════════════════
//  1. Station geo dictionary
// ══════════════════════════════════════════
const STATIONS = {
  '尖沙咀': { lat: 22.3021, lon: 114.1743 },
  '大帽山': { lat: 22.4116, lon: 114.1244 },
  '打鼓嶺': { lat: 22.5286, lon: 114.1567 },
  '西貢':   { lat: 22.3836, lon: 114.2708 },
  '昂坪':   { lat: 22.2559, lon: 113.9050 },
  '赤鱲角': { lat: 22.3094, lon: 113.9219 },
  '將軍澳': { lat: 22.3140, lon: 114.2620 },
};

const GEO = {
  latMin: 22.19, latMax: 22.57,
  lonMin: 113.83, lonMax: 114.44,
  W: 200, H: 120,
};

/** Convert geographic coordinates → Three.js world XZ */
function geoToXZ(lat, lon) {
  const nx = (lon - GEO.lonMin) / (GEO.lonMax - GEO.lonMin);
  const nz = 1 - (lat - GEO.latMin) / (GEO.latMax - GEO.latMin);
  return new THREE.Vector3((nx - 0.5) * GEO.W, 0, (nz - 0.5) * GEO.H);
}

// ══════════════════════════════════════════
//  2. Fetch real-time weather from HKO
// ══════════════════════════════════════════
async function fetchWeatherData() {
  setMsg('正在連接香港天文台開放 API…');
  try {
    const PROXY = 'https://api.allorigins.win/raw?url=';
    const HKO   = encodeURIComponent(
      'https://data.weather.gov.hk/weatherAPI/opendata/weather.do?dataType=rhrread&lang=tc'
    );
    const res  = await fetch(PROXY + HKO, { signal: AbortSignal.timeout(9000) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    // Parse: data.temperature.data = [{ place, value, unit }, ...]
    const temps = {};
    (data.temperature?.data || []).forEach(item => {
      if (STATIONS[item.place]) temps[item.place] = parseFloat(item.value);
    });

    if (Object.keys(temps).length > 0) {
      console.log('[HKO] Real-time data loaded:', temps);
      return temps;
    }
    throw new Error('No matching stations in response');
  } catch (e) {
    console.warn('[HKO] API unavailable, using demo data:', e.message);
    setMsg('API 暫時不可用，使用示範數據…');
    await new Promise(r => setTimeout(r, 800));
    return {
      '尖沙咀': 30.2,
      '大帽山': 18.5,
      '打鼓嶺': 27.1,
      '西貢':   29.8,
      '昂坪':   20.3,
      '赤鱲角': 28.6,
      '將軍澳': 29.0,
    };
  }
}

// ══════════════════════════════════════════
//  3. Three.js scene setup
// ══════════════════════════════════════════
const cv       = document.getElementById('cv');
const renderer = new THREE.WebGLRenderer({ canvas: cv, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled  = true;
renderer.shadowMap.type     = THREE.PCFSoftShadowMap;
renderer.toneMapping        = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.88;

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x060B14);
scene.fog = new THREE.FogExp2(0x060B14, 0.005);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 190, 125);
camera.lookAt(0, 0, 0);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Lighting ──
scene.add(new THREE.AmbientLight(0x1a2a4a, 2.0));

const sun = new THREE.DirectionalLight(0xffe8c0, 3.5);
sun.position.set(-80, 160, -40);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left   = sun.shadow.camera.bottom = -150;
sun.shadow.camera.right  = sun.shadow.camera.top    =  150;
sun.shadow.camera.near   = 10;
sun.shadow.camera.far    = 500;
scene.add(sun);

const fillLight = new THREE.DirectionalLight(0x3eb5f1, 0.7);
fillLight.position.set(80, 60, 80);
scene.add(fillLight);

// ══════════════════════════════════════════
//  4. Procedural terrain (mimics HK topography)
// ══════════════════════════════════════════
function elevation(x, z) {
  const nx = (x + GEO.W / 2) / GEO.W;
  const nz = (z + GEO.H / 2) / GEO.H;

  // Gaussian hills at key geographic locations
  const g = (ax, az, sx, sz, h) =>
    Math.exp(-((nx - ax) ** 2 / sx + (nz - az) ** 2 / sz)) * h;

  let e =
    g(0.24, 0.30, 0.012, 0.010, 42) +  // 大帽山 Tai Mo Shan
    g(0.55, 0.22, 0.018, 0.010, 28) +  // 八仙嶺 Pat Sin Leng
    g(0.12, 0.70, 0.020, 0.015, 30) +  // 大嶼山 Lantau
    g(0.40, 0.60, 0.015, 0.010, 18) +  // 九龍群山
    g(0.39, 0.72, 0.006, 0.006, 22) +  // 太平山 Victoria Peak
    g(0.70, 0.40, 0.030, 0.018, 20) -  // 西貢丘陵
    Math.max(0, 0.5 - Math.abs(nz - 0.65)) * 8; // 維港海床下陷

  // Fine terrain noise
  e += Math.sin(nx * 60) * Math.cos(nz * 45) * 0.9;
  e += Math.sin(nx * 120 + 0.5) * Math.cos(nz * 90) * 0.35;
  return Math.max(-2, e);
}

function buildTerrain() {
  const SEG = 220;
  const geo = new THREE.PlaneGeometry(GEO.W, GEO.H, SEG, SEG);
  geo.rotateX(-Math.PI / 2);

  const pos = geo.attributes.position;
  const C = {
    sea:  new THREE.Color(0x0d2a4a),
    low:  new THREE.Color(0x1a3d1a),
    mid:  new THREE.Color(0x3d6b3d),
    high: new THREE.Color(0x7a6a50),
    peak: new THREE.Color(0xb0a090),
  };
  const tc = new THREE.Color();
  const cols = [];

  for (let i = 0; i < pos.count; i++) {
    const y = elevation(pos.getX(i), pos.getZ(i));
    pos.setY(i, y);
    if      (y < 0)  tc.copy(C.sea);
    else if (y < 5)  tc.lerpColors(C.low,  C.mid,  y / 5);
    else if (y < 20) tc.lerpColors(C.mid,  C.high, (y - 5) / 15);
    else             tc.lerpColors(C.high, C.peak, Math.min((y - 20) / 22, 1));
    cols.push(tc.r, tc.g, tc.b);
  }
  geo.setAttribute('color', new THREE.Float32BufferAttribute(cols, 3));
  geo.computeVertexNormals();

  const mesh = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ vertexColors: true }));
  mesh.receiveShadow = mesh.castShadow = true;
  scene.add(mesh);

  // Ocean surface
  const seaMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(GEO.W, GEO.H).rotateX(-Math.PI / 2),
    new THREE.MeshPhongMaterial({
      color: 0x0a2a4a, transparent: true, opacity: 0.82,
      shininess: 110, specular: 0x3eb5f1,
    })
  );
  seaMesh.position.y = -0.3;
  scene.add(seaMesh);

  // Stars
  const starPts = new Float32Array(3000 * 3);
  for (let i = 0; i < 3000; i++) {
    starPts[i * 3]     = (Math.random() - 0.5) * 1800;
    starPts[i * 3 + 1] = Math.random() * 400 + 80;
    starPts[i * 3 + 2] = (Math.random() - 0.5) * 1800;
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPts, 3));
  scene.add(new THREE.Points(starGeo,
    new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, sizeAttenuation: true })
  ));
}

// ══════════════════════════════════════════
//  5. Weather labels (manual CSS projection)
// ══════════════════════════════════════════
const LABEL_REFS = []; // { el, worldPos }

function buildWeatherLabels(temps) {
  // Remove old
  LABEL_REFS.forEach(({ el }) => el.parentNode?.removeChild(el));
  LABEL_REFS.length = 0;

  Object.entries(temps).forEach(([name, temp]) => {
    const stn = STATIONS[name]; if (!stn) return;
    const p = geoToXZ(stn.lat, stn.lon);
    p.y = Math.max(elevation(p.x, p.z) + 5, 6);

    const col   = temp > 28 ? '#FF4E3A' : temp < 23 ? '#3EB5F1' : '#E8D87A';
    const bgCol = temp > 28
      ? 'rgba(60,10,10,.90)'
      : temp < 23
        ? 'rgba(10,30,60,.90)'
        : 'rgba(30,28,10,.90)';
    const glowA = temp > 28 ? 'rgba(255,78,58,.55)' : temp < 23 ? 'rgba(62,181,241,.55)' : 'rgba(232,216,122,.45)';

    const el = document.createElement('div');
    el.style.cssText = `
      position:fixed;transform:translate(-50%,-100%);
      pointer-events:none;text-align:center;z-index:20;
      animation:lbIn .5s ease both`;
    el.innerHTML = `
      <div style="display:inline-block;padding:7px 13px 5px;border-radius:8px;
        border:1.5px solid ${col};background:${bgCol};
        box-shadow:0 0 18px ${glowA},inset 0 0 10px ${glowA};
        white-space:nowrap;position:relative">
        <div style="font-size:10px;font-weight:700;letter-spacing:1.2px;margin-bottom:2px">${name}</div>
        <div style="font-family:monospace;font-size:14px;font-weight:700;color:${col}">${temp.toFixed(1)}°C</div>
        <div style="position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);
          border-left:5px solid transparent;border-right:5px solid transparent;
          border-top:7px solid ${col}"></div>
      </div>`;
    document.body.appendChild(el);
    LABEL_REFS.push({ el, worldPos: p.clone() });
  });

  // Inject animation keyframe once
  if (!document.getElementById('lb-anim')) {
    const style = document.createElement('style');
    style.id = 'lb-anim';
    style.textContent = `@keyframes lbIn{from{opacity:0;transform:translate(-50%,-115%) scale(.8)}to{opacity:1;transform:translate(-50%,-100%) scale(1)}}`;
    document.head.appendChild(style);
  }

  // Side panel
  const sorted = Object.entries(temps).sort((a, b) => a[1] - b[1]);
  panelEl.innerHTML = sorted.map(([n, t]) => {
    const c = t > 28 ? '#FF4E3A' : t < 23 ? '#3EB5F1' : '#E8D87A';
    return `<div class="pr"><span class="pn">${n}</span>
      <span class="pv" style="color:${c}">${t.toFixed(1)}°C</span></div>`;
  }).join('');
  panelEl.classList.add('vis');
}

/** Project world position → screen position */
function worldToScreen(worldPos) {
  const v = worldPos.clone().project(camera);
  return {
    x: (v.x * 0.5 + 0.5) * window.innerWidth,
    y: (-v.y * 0.5 + 0.5) * window.innerHeight,
    behind: v.z > 1,
  };
}

// ══════════════════════════════════════════
//  6. Cinema camera path (30 s broadcast-style)
// ══════════════════════════════════════════
let cinemaPath    = null;
let cinemaStart   = null;
let cinemaRunning = false;

function buildCinemaPath() {
  const tms = geoToXZ(22.4116, 114.1244); // 大帽山
  const dkl = geoToXZ(22.5286, 114.1567); // 打鼓嶺
  return [
    // t=0 : harbour overview (hold)
    { t:  0, pos: new THREE.Vector3(  0, 195, 125), tgt: new THREE.Vector3(0, 0, 0),
      label: '全港概覽 · 維多利亞港上空' },
    { t:  5, pos: new THREE.Vector3(  0, 195, 125), tgt: new THREE.Vector3(0, 0, 0),
      label: '全港概覽 · 維多利亞港上空' },
    // t=5~15 : swoop to Tai Mo Shan
    { t: 15, pos: new THREE.Vector3(tms.x + 10, 50, tms.z - 16),
              tgt: new THREE.Vector3(tms.x, elevation(tms.x, tms.z) + 2, tms.z),
      label: '大帽山特寫 · 全港最高點 · 低溫預警' },
    // t=15~25 : pan to Dau Keng Ling
    { t: 25, pos: new THREE.Vector3(dkl.x + 14, 48, dkl.z - 10),
              tgt: new THREE.Vector3(dkl.x, elevation(dkl.x, dkl.z) + 2, dkl.z),
      label: '打鼓嶺 · 新界北部內陸溫差分析' },
    // t=25~30 : pull back to overview
    { t: 30, pos: new THREE.Vector3( 20, 210, 140), tgt: new THREE.Vector3(0, 0, 0),
      label: '全景收尾 · 香港各區實時氣溫' },
  ];
}

function easeInOut3(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - (-2 * t + 2) ** 3 / 2;
}

function updateCinemaCamera(elapsed) {
  const P = cinemaPath; if (!P) return;
  const t = Math.min(elapsed, 30);

  let seg = P.length - 2;
  for (let i = 0; i < P.length - 1; i++) {
    if (t >= P[i].t && t < P[i + 1].t) { seg = i; break; }
  }

  const a = P[seg], b = P[seg + 1];
  const dur = b.t - a.t;
  const e   = dur > 0 ? easeInOut3(Math.min((t - a.t) / dur, 1)) : 1;

  camera.position.lerpVectors(a.pos, b.pos, e);
  camera.lookAt(new THREE.Vector3().lerpVectors(a.tgt, b.tgt, e));
  camInfoEl.textContent = b.label || a.label;
}

// ══════════════════════════════════════════
//  7. Render loop
// ══════════════════════════════════════════
const clock3 = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const elapsed = clock3.getElapsedTime();

  // Ambient light breathing
  fillLight.intensity = 0.7 + Math.sin(elapsed * 0.4) * 0.15;

  // Cinema camera
  if (cinemaRunning && cinemaStart !== null) {
    const t = (Date.now() - cinemaStart) / 1000;
    updateCinemaCamera(t);
    if (t >= 30) {
      cinemaRunning = false;
      camInfoEl.textContent = '鏡頭動畫完畢 · 可使用滑鼠旋轉探索地形';
    }
  }

  // Project CSS labels to screen
  LABEL_REFS.forEach(({ el, worldPos }) => {
    const s = worldToScreen(worldPos);
    if (s.behind) { el.style.display = 'none'; return; }
    el.style.display = 'block';
    el.style.left = s.x + 'px';
    el.style.top  = s.y + 'px';
  });

  renderer.render(scene, camera);
}

// ══════════════════════════════════════════
//  8. Main entry — orchestrates everything
// ══════════════════════════════════════════
async function main() {
  try {
    setMsg('正在生成香港 3D 立體地形…');
    buildTerrain();

    const temps = await fetchWeatherData();

    setMsg('正在渲染實時天氣標籤…');
    buildWeatherLabels(temps);

    setMsg('啟動電視台風格鏡頭動畫…');
    await new Promise(r => setTimeout(r, 400));
    hideStatus();

    // Start render loop
    animate();

    // Launch cinema camera after brief pause
    setTimeout(() => {
      cinemaPath    = buildCinemaPath();
      cinemaStart   = Date.now();
      cinemaRunning = true;
      camInfoEl.textContent = '全港概覽 · 維多利亞港上空';
    }, 700);

  } catch (err) {
    console.error(err);
    setMsg('⚠ 錯誤：' + err.message);
  }
}

main();
</script>
</body>
</html>
