<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗺️ K-Walk 3D 戰術大腦</title>
<style>
body {
margin: 0; padding: 0;
overflow: hidden;
background-color: #1a1a2e; /* 預設深藍底色 */
color: #ffffff;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

/* 3D 畫布置底填滿 */
#canvas-container {
position: absolute;
top: 0; left: 0;
width: 100vw; height: 100vh;
z-index: 1;
}

/* 頂部數據狀態欄 */
.top-hud {
position: absolute;
top: 15px; left: 50%;
transform: translateX(-50%);
z-index: 10;
display: flex;
gap: 15px;
background: rgba(20, 20, 35, 0.75);
backdrop-filter: blur(10px);
-webkit-backdrop-filter: blur(10px);
border: 1px solid rgba(255, 255, 255, 0.1);
padding: 10px 20px;
border-radius: 30px;
box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.hud-item { text-align: center; font-size: 0.85rem; color: #ccc; }
.hud-item b { display: block; font-size: 1.1rem; color: #00ffcc; }

/* 左側核心戰術面板 */
.control-panel {
position: absolute;
top: 90px; left: 20px;
z-index: 10;
width: 280px;
background: rgba(20, 20, 35, 0.75);
backdrop-filter: blur(10px);
border: 1px solid rgba(255, 255, 255, 0.1);
border-radius: 12px;
padding: 15px;
}
.panel-title { font-size: 1rem; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.status-badge { background: rgba(0,0,0,0.4); padding: 6px 10px; border-radius: 6px; margin-bottom: 8px; font-size: 0.85rem; border-left: 3px solid #00ffcc; }

/* 底部時間軸控制 */
.bottom-timeline {
position: absolute;
bottom: 25px; left: 50%;
transform: translateX(-50%);
z-index: 10;
width: 90%; max-width: 400px;
background: rgba(20, 20, 35, 0.8);
backdrop-filter: blur(10px);
border: 1px solid rgba(255, 255, 255, 0.15);
border-radius: 12px;
padding: 15px;
}
input[type="range"] { width: 100%; margin-top: 8px; cursor: pointer; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

<div id="canvas-container"></div>

<div class="top-hud">
<div class="hud-item">🌧️ 雨量<b id="hud-rain">0.0mm</b></div>
<div class="hud-item">🌡️ 氣溫<b id="hud-temp">30.4°C</b></div>
<div class="hud-item">💨 風速<b id="hud-wind">28km/h</b></div>
<div class="hud-item">💧 濕度<b id="hud-humidity">78%</b></div>
</div>

<div class="control-panel">
<div class="panel-title">🧭 K-Walk 3D 戰術大腦</div>
<div class="status-badge" style="border-left-color: #00ffcc;">🗺️ 3D 地圖：荔枝角戰區已就緒</div>
<div class="status-badge" style="border-left-color: #ffaa00;">🔥 實時爆單點：已同步運行</div>
<div class="status-badge" style="border-left-color: #00ccff;">☁️ 天氣：荔枝角上空暫無降雨</div>
</div>

<div class="bottom-timeline">
<div style="display:flex; justify-content:space-between; font-size:0.9rem;">
<span>☀️ 實時陰影與避曬觀測儀</span>
<span id="time-display" style="color:#00ffcc; font-weight:bold;">14:00</span>
</div>
<input type="range" id="time-slider" min="360" max="1260" value="840" step="10">
</div>

<script>
let scene, camera, renderer, controls, dirLight;
const container = document.getElementById('canvas-container');

// ==================== 1. 初始化 3D 場景 ====================
function init3D() {
scene = new THREE.Scene();

// 🌌 關鍵修正：初始背景色改為深藍色 (科技感)
scene.background = new THREE.Color('#141423');
scene.fog = new THREE.FogExp2('#141423', 0.0015);

// 📷 關鍵修正：重配相機角度，讓模型一進來就在畫面正中央
camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 5000);
camera.position.set(0, 300, 450); // 從斜上方俯瞰

renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

// 🕹️ 關鍵修正：鎖定 OrbitControls 的焦點在 (0,0,0) 城市中心
controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0); // 確保圍繞中心旋轉
controls.maxPolarAngle = Math.PI / 2.1; // 限制不能看到地平線以下

// ==================== 2. 燈光系統 ====================
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(100, 200, 100);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 1000;
const d = 300;
dirLight.shadow.camera.left = -d;
dirLight.shadow.camera.right = d;
dirLight.shadow.camera.top = d;
dirLight.shadow.camera.bottom = -d;
scene.add(dirLight);

// 建立一塊基礎地面墊底 (防止穿幫)
const groundGeo = new THREE.PlaneGeometry(2000, 2000);
const groundMat = new THREE.MeshStandardMaterial({ color: #11111d, roughness: 0.8 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.5;
ground.receiveShadow = true;
scene.add(ground);

// ==================== 3. 載入荔枝角模型 ====================
const loader = new THREE.GLTFLoader();
// 請確保你的檔案命名為 hongkong.glb 並與此 html 放在同一目錄
loader.load('hongkong.glb', function (gltf) {
const model = gltf.scene;

// 自動計算模型的中心點，將其精準強制對齊到 3D 空間的 (0,0,0) 坐標
const box = new THREE.Box3().setFromObject(model);
const center = box.getCenter(new THREE.Vector3());
model.position.x += (model.position.x - center.x);
model.position.z += (model.position.z - center.z);
model.position.y += (model.position.y - box.min.y); // 底部貼地

model.traverse(function (node) {
if (node.isMesh) {
node.castShadow = true;
node.receiveShadow = true;
// 如果原本建築物顏色太暗，可以在這裡覆蓋成灰白色
if(node.material) node.material.roughness = 0.6;
}
});

scene.add(model);
console.log("🚀 荔枝角 3D 模型已精確置中加載！");
}, undefined, function (error) {
console.log("Fallback: 找不到實體模型，生成基礎方格城市。");
createFallbackCity();
});

window.addEventListener('resize', onWindowResize);
}

// 當找不到模型時的藍色方塊備用城市
function createFallbackCity() {
const group = new THREE.Group();
for (let i = 0; i < 60; i++) {
const h = Math.random() * 80 + 20;
const geo = new THREE.BoxGeometry(20, h, 20);
const mat = new THREE.MeshStandardMaterial({ color: 0x1e295d, roughness: 0.4 });
const mesh = new THREE.Mesh(geo, mat);
mesh.position.set(Math.random() * 300 - 150, h/2, Math.random() * 300 - 150);
mesh.castShadow = true; mesh.receiveShadow = true;
group.add(mesh);
}
scene.add(group);
}

function onWindowResize() {
camera.aspect = window.innerWidth / window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
}

// ==================== 4. 🔗 關鍵：動態天色轉變邏輯 ====================
function updateSkyColor(minutes) {
const hours = minutes / 60;
let skyColor = new THREE.Color('#141423'); // 預設戰術深藍

if (hours >= 6 && hours < 10) {
// 🌅 清晨：晨曦藍粉色
skyColor.setHSL(0.58, 0.4, 0.25);
} else if (hours >= 10 && hours < 15) {
// ☀️ 正午：明亮高對比科技藍
skyColor.setRGB(0.12, 0.16, 0.28);
} else if (hours >= 15 && hours < 19) {
// 🌇 傍晚：帶點微黃/溫暖橙的夕陽藍
skyColor.setRGB(0.22, 0.15, 0.18);
} else {
// 🌌 夜間：極深藍黑色 (幫你省電＋護眼)
skyColor.setRGB(0.05, 0.05, 0.09);
}

// 平滑過渡背景與霧氣顏色
scene.background = skyColor;
scene.fog.color = skyColor;

// 連動修改太陽光（陰影）的位置
const angle = (minutes / 1440) * Math.PI * 2 - (Math.PI / 2);
dirLight.position.x = Math.cos(angle) * 300;
dirLight.position.y = Math.sin(angle) * 300;
if (dirLight.position.y < 0) dirLight.position.y = -10; // 太陽下山
}

// 滑桿事件監聽
document.getElementById('time-slider').addEventListener('input', (e) => {
const minutes = parseInt(e.target.value);
const hours = Math.floor(minutes / 60);
const mins = minutes % 60;
document.getElementById('time-display').innerText = `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}`;

// 驅動天色與陰影改變
updateSkyColor(minutes);
});

// 動態循環
function animate() {
requestAnimationFrame(animate);
controls.update();
renderer.render(scene, camera);
}

// 啟動
init3D();
updateSkyColor(840); // 預設 14:00 天色
animate();
</script>
</body>
</html>
