<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌧️ K-Walk 戰術天氣大腦</title>
<style>
:root {
--bg-color: #12121a;
--panel-bg: rgba(25, 25, 35, 0.65);
--accent-color: #00ffcc;
}

body {
margin: 0; padding: 0;
background-color: var(--bg-color);
color: #ffffff;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
overflow: hidden;
transition: background 1s ease;
}

/* 🌧️ 實時天氣動畫畫布 (情緒價值拉滿) */
#weather-canvas {
position: absolute;
top: 0; left: 0;
width: 100vw; height: 100vh;
z-index: 1;
pointer-events: none;
}

/* 2D 戰術儀表板主容器 */
.dashboard {
position: relative;
z-index: 10;
max-width: 480px;
margin: 0 auto;
padding: 15px;
box-sizing: border-box;
height: 100vh;
display: flex;
flex-direction: column;
gap: 12px;
overflow-y: auto;
}

/* 頂部數據狀態列 */
.weather-grid {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 8px;
}

.data-box {
background: var(--panel-bg);
backdrop-filter: blur(12px);
-webkit-backdrop-filter: blur(12px);
border: 1px solid rgba(255, 255, 255, 0.1);
border-radius: 8px;
padding: 10px 5px;
text-align: center;
}

.data-box .label { font-size: 0.75rem; color: #aaa; margin-bottom: 4px; }
.data-box .value { font-size: 1.1rem; font-weight: bold; color: var(--accent-color); }

/* 中央核心戰術看板 */
.main-status-panel {
background: var(--panel-bg);
backdrop-filter: blur(12px);
-webkit-backdrop-filter: blur(12px);
border: 1px solid rgba(255, 255, 255, 0.15);
border-radius: 12px;
padding: 18px;
box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

h1 { font-size: 1.2rem; margin: 0 0 12px 0; display: flex; align-items: center; gap: 6px; }

.status-item {
background: rgba(0, 0, 0, 0.3);
padding: 10px;
border-radius: 6px;
margin-bottom: 8px;
font-size: 0.9rem;
border-left: 4px solid var(--accent-color);
}

/* 避曬滑桿控制面板 */
.control-panel {
background: var(--panel-bg);
backdrop-filter: blur(12px);
border: 1px solid rgba(255, 255, 255, 0.1);
border-radius: 12px;
padding: 15px;
margin-top: auto; /* 釘在底部 */
}

input[type="range"] {
width: 100%;
margin: 10px 0;
cursor: pointer;
}

.flex-space {
display: flex;
justify-content: space-between;
align-items: center;
font-size: 0.9rem;
}
</style>
</head>
<body>

<canvas id="weather-canvas"></canvas>

<div class="dashboard">
<div class="weather-grid">
<div class="data-box">
<div class="label">🌧️ 雨量</div>
<div class="value" id="val-rain">0.0<span style="font-size:0.7rem">mm</span></div>
</div>
<div class="data-box">
<div class="label">🌡️ 氣溫</div>
<div class="value" id="val-temp">28.5<span style="font-size:0.7rem">°C</span></div>
</div>
<div class="data-box">
<div class="label">💨 風速</div>
<div class="value" id="val-wind">14<span style="font-size:0.7rem">km/h</span></div>
</div>
<div class="data-box">
<div class="label">💧 濕度</div>
<div class="value" id="val-humidity">82<span style="font-size:0.7rem">%</span></div>
</div>
</div>

<div class="main-status-panel">
<h1>🌂 K-Walk 戰術大腦 (荔枝角)</h1>

<div class="status-item" style="border-left-color: #00ffcc;">
🛰️ 實時路況：<span id="rainAlert" style="color: #00ffcc; font-weight: bold;">☁️ 荔枝角上空暫無降雨</span>
</div>

<div class="status-item" style="border-left-color: #ffcc00;">
🧠 AI 超前預測：<span id="aiForecastMsg">⏳ 正在連線 Tomorrow.io...</span>
</div>

<div class="status-item" style="border-left-color: #ff3300;">
🔥 實時爆單狀態：<span style="color: #ffaa00;">已同步 4 個外賣取餐爆單點 (安全運行)</span>
</div>
</div>

<div class="control-panel">
<div class="flex-space">
<strong style="display:flex; align-items:center; gap:4px;">🌞 避曬與模擬光影系統</strong>
<span id="sunStatus" style="color:#ffaa00; font-weight:bold;">常態模式</span>
</div>
<input type="range" id="timeSlider" min="420" max="1080" value="840">
<div class="flex-space">
<span>觀測時間: <b id="timeDisplay" style="color:var(--accent-color); font-size:1.1rem;">14:00</b></span>
</div>
</div>
</div>

<script>
// ==================== 1. 基本設定 ====================
const workerUrl = 'https://crowdtest8.ctakwah.workers.dev/';
const TOMORROW_API_KEY = "Eff94C5FCuRqlqWKPt0tXwHM1niZNEYh";
let isRainingNow = false;
let rainIntensity = 0; // 0 = 無雨, 1 = 細雨, 2 = 大雨

// ==================== 2. 2D 動態天氣粒子特效 (情緒價值核心) ====================
const canvas = document.getElementById('weather-canvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function createParticles() {
particles = [];
let count = rainIntensity === 2 ? 150 : (rainIntensity === 1 ? 60 : 0);

// 如果是晴天，改為生成少許陽光溫馨微粒
if (rainIntensity === 0) {
count = 15; // 晴天微粒
}

for (let i = 0; i < count; i++) {
particles.push({
x: Math.random() * canvas.width,
y: Math.random() * canvas.height,
length: rainIntensity > 0 ? Math.random() * 20 + 10 : Math.random() * 4 + 2, // 雨滴長度
speed: rainIntensity > 0 ? Math.random() * 8 + 6 : Math.random() * 0.5 + 0.2, // 下落速度
opacity: Math.random() * 0.4 + 0.2
});
}
}

function animateWeather() {
ctx.clearRect(0, 0, canvas.width, canvas.height);

ctx.strokeStyle = rainIntensity > 0 ? 'rgba(174, 219, 255, ' : 'rgba(255, 210, 100, ';
ctx.lineWidth = rainIntensity > 0 ? 1.5 : 2;

particles.forEach(p => {
ctx.beginPath();
if (rainIntensity > 0) {
// 畫斜斜落下的雨絲
ctx.moveTo(p.x, p.y);
ctx.lineTo(p.x - 2, p.y + p.length);
ctx.strokeStyle = `rgba(174, 219, 255, ${p.opacity})`;
ctx.stroke();

p.y += p.speed;
p.x -= 0.5;
if (p.y > canvas.height) { p.y = -20; p.x = Math.random() * canvas.width; }
} else {
// 畫晴天的圓點漂浮粒子
ctx.arc(p.x, p.y, p.length, 0, Math.PI * 2);
ctx.fillStyle = `rgba(255, 210, 100, ${p.opacity * 0.3})`;
ctx.fill();

p.y -= p.speed;
if (p.y < -10) { p.y = canvas.height + 10; p.x = Math.random() * canvas.width; }
}
});

requestAnimationFrame(animateWeather);
}

// ==================== 3. 數據同步與控制邏輯 ====================
function updateWeatherUI(hasRain, rainVal, temp, wind, hum) {
document.getElementById('val-rain').innerHTML = `${rainVal.toFixed(1)}<span style="font-size:0.7rem">mm</span>`;
document.getElementById('val-temp').innerHTML = `${temp}<span style="font-size:0.7rem">°C</span>`;
document.getElementById('val-wind').innerHTML = `${wind}<span style="font-size:0.7rem">km/h</span>`;
document.getElementById('val-humidity').innerHTML = `${hum}<span style="font-size:0.7rem">%</span>`;

const alertEl = document.getElementById('rainAlert');
if (hasRain || rainVal > 0.5) {
alertEl.innerText = `⚠️ 戰區預報：荔枝角正在落雨，請帶雨具！`;
alertEl.style.color = "#ff6b6b";
document.body.style.backgroundColor = "#1a1c24"; // 變暗色陰雨天背景
rainIntensity = rainVal > 5 ? 2 : 1;
} else {
alertEl.innerText = `☁️ 實時路況：荔枝角上空暫無降雨`;
alertEl.style.color = "#00ffcc";
document.body.style.backgroundColor = "#12121a";
rainIntensity = 0;
}
createParticles();
}

// 模擬滑桿跟天氣大腦聯動
document.getElementById('timeSlider').addEventListener('input', (e) => {
const minutes = parseInt(e.target.value);
const hours = Math.floor(minutes / 60);
const mins = minutes % 60;
document.getElementById('timeDisplay').innerText = `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}`;

// 模擬中午暴曬變色效果
if (hours >= 11 && hours <= 14 && rainIntensity === 0) {
document.getElementById('sunStatus').innerText = "🥵 中午高溫暴曬避曬模式";
document.getElementById('sunStatus').style.color = "#ff3300";
document.body.style.backgroundColor = "#241b12"; // 變成帶有一點黃昏/烈日灼熱感的橙黑色
} else {
document.getElementById('sunStatus').innerText = rainIntensity > 0 ? "🌧 陰雨戰術模式" : "常態防護";
document.getElementById('sunStatus').style.color = rainIntensity > 0 ? "#8be0ff" : "#ffaa00";
if (rainIntensity === 0) document.body.style.backgroundColor = "#12121a";
}
});

// 獲取天文台/Worker 數據
function initWeatherDashboard() {
// 先用一組安全的本地基準數據墊底
updateWeatherUI(false, 0.0, 30.4, 28, 78);

fetch(`${workerUrl}?lat=22.3372&lon=114.1480`)
.then(res => res.json())
.then(data => {
// 這裡根據你 Worker 回傳的格式進行對接
const hasRain = data.hasRain || false;
const rainVal = data.immediateRain || 0;
updateWeatherUI(hasRain, rainVal, 30.4, 28, 78);
})
.catch(() => {
console.log("使用基準氣象防護運行中");
});

// 明日天氣 AI 預測連線
fetch(`https://api.tomorrow.io/v4/weather/forecast?location=22.3372,114.1480&timesteps=1h&apikey=${TOMORROW_API_KEY}`)
.then(res => res.json())
.then(data => {
if (data && data.timelines && data.timelines.hourly) {
const nextHour = data.timelines.hourly[0].values;
const nextRain = nextHour.rainIntensity || 0;
if (nextRain > 1) {
document.getElementById('aiForecastMsg').innerText = "🌧 AI 預測：一小時內即將開火有雨！";
document.getElementById('aiForecastMsg').style.color = "#ff6b6b";
} else {
document.getElementById('aiForecastMsg').innerText = "☀️ 未來三小時內大氣平穩，無雨。";
document.getElementById('aiForecastMsg').style.color = "#00ffcc";
}
}
})
.catch(() => {
document.getElementById('aiForecastMsg').innerText = "☀️ AI 氣象雲守護中 (暫無異常)";
});
}

// 啟動
initWeatherDashboard();
createParticles();
animateWeather();
</script>
</body>
</html>
